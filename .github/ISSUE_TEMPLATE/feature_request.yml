name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're solving and how deployoor could help. Roadmap context lives in [TODO.md](https://github.com/raycashxyz/deployoor/blob/main/TODO.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this address?
      placeholder: "When I … I have to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like deployoor to behave?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Deploy engine
        - CLI / DX
        - Plugins
        - Hardhat / Foundry compatibility
        - Testing
        - wagmi / consumption
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
          required: false
