name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # rolldown (tsdown's build engine) needs Node 20+ (node:util styleText).
        # The published dist targets node18, so consumers on Node 18 are fine.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # Smoke-test fs-store/lock paths on Windows (ubuntu-only matrix misses platform-specific bugs).
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Plugin tests import `deployoor/plugin`, which resolves via package exports to
      # `dist/`. On Windows, turbo can schedule those tests before `deployoor#build`
      # finishes when the full monorepo test graph runs in parallel.
      - run: pnpm build
      - run: pnpm test

  # Fails a PR that changes a publishable package without a changeset.
  # For changes that need no release, add an empty one: `pnpm changeset --empty`.
  # Skipped on the Changesets "Version Packages" PR (branch `changeset-release/*`): it
  # consumes the changeset files by design, so this gate would always (wrongly) fail there.
  changeset:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git fetch origin "${{ github.base_ref }}"
      - run: pnpm exec changeset status --since="origin/${{ github.base_ref }}"
