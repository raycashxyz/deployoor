name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "vercel.json"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @deployoor/docs build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link raycash/deployoor-docs
        working-directory: apps/docs
        run: vercel link --yes --scope raycash --project deployoor-docs --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel build output
        working-directory: apps/docs
        run: vercel build --prod --yes --scope raycash --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt
        working-directory: apps/docs
        run: vercel deploy --prebuilt --prod --yes --scope raycash --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
