name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # >= 22.14 for OIDC
          cache: pnpm
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Opens a "Version Packages" PR when changesets exist; publishes on merge.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          # Tokenless: each package has a trusted publisher configured on npm.
          # With no NPM_TOKEN and id-token: write, changesets/action publishes via
          # OIDC trusted publishing; provenance is then generated automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
